<!DOCTYPE html>
<html lang="ka">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🏗️ სამშენებლო ლექსიკონი | Construction Dictionary</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Georgian:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #1a5f7a;
            --primary-light: #2e8bc0;
            --primary-dark: #0d3d4d;
            --accent: #e76f51;
            --bg: #f8f9fa;
            --card-bg: #ffffff;
            --text: #2b2d42;
            --text-light: #6c757d;
            --border: #e9ecef;
            --shadow: 0 2px 8px rgba(0,0,0,0.08);
            --shadow-lg: 0 8px 30px rgba(0,0,0,0.12);
            --radius: 16px;
            --radius-sm: 12px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Noto Sans Georgian', 'Inter', sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            min-height: 100vh;
        }
        .header {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            padding: 3rem 1rem 4rem;
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        .header::before {
            content: '';
            position: absolute;
            top: -50%; left: -50%;
            width: 200%; height: 200%;
            background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.05'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
            animation: float 20s linear infinite;
        }
        @keyframes float { 0% { transform: translate(0,0); } 100% { transform: translate(-60px,-60px); } }
        .header h1 { font-size: 2.5rem; margin-bottom: 0.5rem; position: relative; font-weight: 700; }
        .header p { font-size: 1.1rem; opacity: 0.9; position: relative; font-weight: 300; }
        .header .badge {
            display: inline-block;
            background: rgba(255,255,255,0.15);
            padding: 0.4rem 1rem;
            border-radius: 50px;
            margin-top: 1rem;
            font-size: 0.9rem;
            backdrop-filter: blur(10px);
        }
        .controls {
            max-width: 1200px;
            margin: -2rem auto 2rem;
            padding: 0 1rem;
            position: relative;
            z-index: 10;
        }
        .controls-inner {
            background: var(--card-bg);
            border-radius: var(--radius);
            box-shadow: var(--shadow-lg);
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        .search-box { position: relative; width: 100%; }
        .search-box input {
            width: 100%;
            padding: 1rem 1rem 1rem 3rem;
            border: 2px solid var(--border);
            border-radius: var(--radius-sm);
            font-size: 1rem;
            font-family: inherit;
            transition: all 0.3s;
            background: var(--bg);
        }
        .search-box input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(26,95,122,0.1);
        }
        .search-box .icon {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-light);
            font-size: 1.2rem;
        }
        .categories {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            justify-content: center;
        }
        .cat-btn {
            padding: 0.5rem 1rem;
            border: 2px solid var(--border);
            border-radius: 50px;
            background: transparent;
            cursor: pointer;
            font-family: inherit;
            font-size: 0.9rem;
            font-weight: 500;
            color: var(--text-light);
            transition: all 0.3s;
            white-space: nowrap;
        }
        .cat-btn:hover { border-color: var(--primary-light); color: var(--primary); }
        .cat-btn.active { background: var(--primary); color: white; border-color: var(--primary); }
        .cat-btn .count {
            display: inline-block;
            background: rgba(0,0,0,0.1);
            padding: 0.1rem 0.4rem;
            border-radius: 50px;
            font-size: 0.75rem;
            margin-left: 0.3rem;
        }
        .cat-btn.active .count { background: rgba(255,255,255,0.2); }
        .stats {
            max-width: 1200px;
            margin: 0 auto 1.5rem;
            padding: 0 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            color: var(--text-light);
            font-size: 0.9rem;
        }
        .grid {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 1rem 3rem;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 1.5rem;
        }
        .card {
            background: var(--card-bg);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            overflow: hidden;
            transition: all 0.3s;
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            animation: fadeIn 0.5s ease-out;
        }
        .card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-lg);
            border-color: var(--primary-light);
        }
        .card-image {
            width: 100%;
            height: 200px;
            object-fit: cover;
            background: linear-gradient(135deg, #e9ecef, #dee2e6);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-light);
            font-size: 3rem;
            position: relative;
        }
        .card-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .card-image .placeholder {
            font-size: 3rem;
            opacity: 0.3;
        }
        .card-category {
            position: absolute;
            top: 1rem;
            right: 1rem;
            background: var(--accent);
            color: white;
            padding: 0.3rem 0.8rem;
            border-radius: 50px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .card-body { padding: 1.5rem; flex: 1; display: flex; flex-direction: column; }
        .card-title {
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 0.3rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .card-translation {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--accent);
            margin-bottom: 0.8rem;
            padding-bottom: 0.8rem;
            border-bottom: 2px solid var(--border);
        }
        .card-desc {
            font-size: 0.95rem;
            color: var(--text-light);
            line-height: 1.7;
            flex: 1;
        }
        .card-id {
            margin-top: 1rem;
            font-size: 0.75rem;
            color: var(--text-light);
            opacity: 0.6;
        }
        .empty {
            grid-column: 1 / -1;
            text-align: center;
            padding: 4rem 2rem;
            color: var(--text-light);
        }
        .empty-icon { font-size: 4rem; margin-bottom: 1rem; opacity: 0.5; }
        .footer {
            text-align: center;
            padding: 2rem;
            color: var(--text-light);
            font-size: 0.9rem;
            border-top: 1px solid var(--border);
        }
        .scroll-top {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            width: 50px;
            height: 50px;
            background: var(--primary);
            color: white;
            border: none;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.5rem;
            box-shadow: var(--shadow-lg);
            transition: all 0.3s;
            opacity: 0;
            visibility: hidden;
            z-index: 100;
        }
        .scroll-top.visible { opacity: 1; visibility: visible; }
        .scroll-top:hover { background: var(--primary-dark); transform: translateY(-2px); }
        @media (max-width: 768px) {
            .header h1 { font-size: 1.8rem; }
            .grid { grid-template-columns: 1fr; }
            .categories { justify-content: flex-start; overflow-x: auto; padding-bottom: 0.5rem; }
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    
        .quiz-btn {
            display: inline-block;
            background: linear-gradient(135deg, var(--accent), #d35400);
            color: white;
            padding: 0.7rem 1.5rem;
            border-radius: 50px;
            margin-top: 1rem;
            font-size: 1rem;
            font-weight: 600;
            border: none;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 15px rgba(231,111,81,0.3);
            font-family: inherit;
        }
        .quiz-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(231,111,81,0.4);
        }
        .quiz-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px);
            z-index: 1000;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }
        .quiz-overlay.active { display: flex; }
        .quiz-modal {
            background: var(--card-bg);
            border-radius: var(--radius);
            max-width: 700px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: var(--shadow-lg);
            animation: quizIn 0.4s ease-out;
        }
        @keyframes quizIn {
            from { opacity: 0; transform: scale(0.9) translateY(20px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }
        .quiz-header {
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            color: white;
            padding: 1.5rem 2rem;
            border-radius: var(--radius) var(--radius) 0 0;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .quiz-header h2 { font-size: 1.5rem; margin: 0; }
        .quiz-close {
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            width: 36px; height: 36px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 1.2rem;
            transition: all 0.3s;
        }
        .quiz-close:hover { background: rgba(255,255,255,0.3); }
        .quiz-body { padding: 2rem; }
        .quiz-progress {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 1.5rem;
        }
        .quiz-progress-bar {
            flex: 1;
            height: 8px;
            background: var(--border);
            border-radius: 4px;
            overflow: hidden;
        }
        .quiz-progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), var(--primary-light));
            border-radius: 4px;
            transition: width 0.5s ease;
        }
        .quiz-progress-text {
            font-size: 0.9rem;
            color: var(--text-light);
            font-weight: 500;
            white-space: nowrap;
        }
        .quiz-question {
            font-size: 1.2rem;
            font-weight: 600;
            color: var(--primary-dark);
            margin-bottom: 1.5rem;
            line-height: 1.5;
        }
        .quiz-question .q-num {
            display: inline-block;
            background: var(--primary);
            color: white;
            width: 32px; height: 32px;
            border-radius: 50%;
            text-align: center;
            line-height: 32px;
            font-size: 0.9rem;
            margin-right: 0.5rem;
        }
        .quiz-options {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }
        .quiz-option {
            padding: 1rem 1.25rem;
            border: 2px solid var(--border);
            border-radius: var(--radius-sm);
            cursor: pointer;
            transition: all 0.3s;
            font-size: 1rem;
            background: var(--bg);
            text-align: left;
            font-family: inherit;
        }
        .quiz-option:hover {
            border-color: var(--primary-light);
            background: rgba(26,95,122,0.05);
        }
        .quiz-option.correct {
            border-color: #059669;
            background: rgba(5,150,105,0.1);
            color: #059669;
        }
        .quiz-option.wrong {
            border-color: #dc2626;
            background: rgba(220,38,38,0.1);
            color: #dc2626;
        }
        .quiz-option.disabled { pointer-events: none; opacity: 0.7; }
        .quiz-feedback {
            margin-top: 1rem;
            padding: 1rem;
            border-radius: var(--radius-sm);
            font-size: 0.95rem;
            display: none;
        }
        .quiz-feedback.show { display: block; }
        .quiz-feedback.correct {
            background: rgba(5,150,105,0.1);
            color: #059669;
            border: 1px solid #059669;
        }
        .quiz-feedback.wrong {
            background: rgba(220,38,38,0.1);
            color: #dc2626;
            border: 1px solid #dc2626;
        }
        .quiz-nav {
            display: flex;
            justify-content: space-between;
            margin-top: 1.5rem;
            gap: 1rem;
        }
        .quiz-nav-btn {
            padding: 0.8rem 1.5rem;
            border-radius: var(--radius-sm);
            border: none;
            cursor: pointer;
            font-family: inherit;
            font-size: 1rem;
            font-weight: 600;
            transition: all 0.3s;
        }
        .quiz-nav-btn.primary {
            background: var(--primary);
            color: white;
        }
        .quiz-nav-btn.primary:hover { background: var(--primary-dark); }
        .quiz-nav-btn.secondary {
            background: var(--border);
            color: var(--text);
        }
        .quiz-nav-btn.secondary:hover { background: #d1d5db; }
        .quiz-nav-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .quiz-start {
            text-align: center;
            padding: 2rem;
        }
        .quiz-start h3 {
            font-size: 1.5rem;
            color: var(--primary-dark);
            margin-bottom: 1rem;
        }
        .quiz-start p {
            color: var(--text-light);
            margin-bottom: 1.5rem;
            font-size: 1rem;
        }
        .quiz-start .quiz-rules {
            background: var(--bg);
            border-radius: var(--radius-sm);
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            text-align: left;
        }
        .quiz-start .quiz-rules li {
            margin-bottom: 0.5rem;
            color: var(--text);
        }
        .quiz-results {
            text-align: center;
            padding: 2rem;
        }
        .quiz-results .score-circle {
            width: 150px; height: 150px;
            border-radius: 50%;
            margin: 0 auto 1.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            font-size: 2.5rem;
            font-weight: 700;
            color: white;
            position: relative;
        }
        .quiz-results .score-circle::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 50%;
            background: conic-gradient(var(--primary) calc(var(--score) * 3.6deg), var(--border) 0);
            mask: radial-gradient(transparent 55%, black 56%);
            -webkit-mask: radial-gradient(transparent 55%, black 56%);
        }
        .quiz-results .score-inner {
            position: relative;
            z-index: 1;
        }
        .quiz-results .score-label {
            font-size: 0.9rem;
            font-weight: 400;
            opacity: 0.8;
        }
        .quiz-results h3 {
            font-size: 1.5rem;
            color: var(--primary-dark);
            margin-bottom: 0.5rem;
        }
        .quiz-results .result-msg {
            color: var(--text-light);
            margin-bottom: 1.5rem;
        }
        .quiz-results .result-detail {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1rem;
            margin-bottom: 1.5rem;
        }
        .quiz-results .result-stat {
            background: var(--bg);
            padding: 1rem;
            border-radius: var(--radius-sm);
        }
        .quiz-results .result-stat .num {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary);
        }
        .quiz-results .result-stat .label {
            font-size: 0.8rem;
            color: var(--text-light);
        }
        @media (max-width: 768px) {
            .quiz-results .result-detail { grid-template-columns: 1fr; }
            .quiz-header h2 { font-size: 1.2rem; }
            .quiz-body { padding: 1rem; }
        }

    </style>

<body>
    <header class="header">
        <h1>🏗️ სამშენებლო ლექსიკონი</h1>
        <p>Construction Dictionary — English-Georgian</p>
        <div class="badge">📚 221 ტერმინი | 6 კატეგორია</div>
        <button class="quiz-btn" onclick="openQuiz()">📝 ტესტი</button>

    </header>

    <div class="controls">
        <div class="controls-inner">
            <div class="search-box">
                <span class="icon">🔍</span>
                <input type="text" id="searchInput" placeholder="მოძებნე ტერმინი... (ინგლისურად ან ქართულად)">
            </div>
            <div class="categories" id="categoryButtons"></div>
        </div>

    </footer>

    <button class="scroll-top" id="scrollTop" onclick="window.scrollTo({top:0,behavior:'smooth'})">↑</button>

    <!-- Quiz Modal -->
    <div class="quiz-overlay" id="quizOverlay">
        <div class="quiz-modal">
            <div class="quiz-header">
                <h2>📝 სამშენებლო ტესტი</h2>
                <button class="quiz-close" onclick="closeQuiz()">✕</button>
            </div>
            <div class="quiz-body" id="quizBody">
                <!-- Content injected by JS -->
            </div>
        </div>
    </div>
    <script>
const vocabulary = [

    {id:4,en:"Slab",ka:"ფილა (გადახურვა)",desc:"ჰორიზონტალური ბეტონის ელემენტი, რომელიც იატაკს ან სახურავს წარმოადგენს.",image:"https://kimi-web-img.moonshot.cn/img/mapleconcretepumping.ca/f2101e42a260124a1421aff9537eae3765488d07.jpg",category:"structure"},
    {id:5,en:"Truss",ka:"ფერმა",desc:"სამკუთხა ელემენტებისგან შემდგარი საყრდენი სისტემა ფართო გადახურვებისთვის.",image:"https://kimi-web-img.moonshot.cn/img/newindscorp.com/5adf86c6cff4aa58fde829ed3fd6665af22d49d2.jpg",category:"structure"},

const categoryNames = {
    all: 'ყველა',
    structure: 'სტრუქტურა',
    materials: 'მასალები',
    tools: 'ხელსაწყოები',
    processes: 'პროცესები',
    professions: 'პროფესიები',
    safety: 'უსაფრთხოება'
};

const categoryColors = {
    structure: '#1a5f7a',
    materials: '#7c3aed',
    tools: '#dc2626',
    processes: '#059669',
    professions: '#d97706',
    safety: '#be123c'
};

let currentCategory = 'all';
let searchTerm = '';

function renderCategories() {
    const counts = {};
    vocabulary.forEach(v => {
        counts[v.category] = (counts[v.category] || 0) + 1;
    });

    const container = document.getElementById('categoryButtons');
    let html = `<button class="cat-btn ${currentCategory === 'all' ? 'active' : ''}" onclick="setCategory('all')">ყველა<span class="count">${vocabulary.length}</span></button>`;

    Object.keys(categoryNames).forEach(cat => {
        if (cat !== 'all') {
            html += `<button class="cat-btn ${currentCategory === cat ? 'active' : ''}" onclick="setCategory('${cat}')">${categoryNames[cat]}<span class="count">${counts[cat] || 0}</span></button>`;
        }
    });

    container.innerHTML = html;
}

function setCategory(cat) {
    currentCategory = cat;
    renderCategories();
    renderCards();
}

function renderCards() {
    const grid = document.getElementById('grid');
    const stats = document.getElementById('stats');

    let filtered = vocabulary.filter(v => {
        const matchCat = currentCategory === 'all' || v.category === currentCategory;
        const matchSearch = !searchTerm || 
            v.en.toLowerCase().includes(searchTerm.toLowerCase()) || 
            v.ka.toLowerCase().includes(searchTerm.toLowerCase()) ||
            v.desc.toLowerCase().includes(searchTerm.toLowerCase());
        return matchCat && matchSearch;
    });

    stats.innerHTML = `<span>მოიძებნა ${filtered.length} ტერმინი</span><span>🇬🇪 ↔ 🇺🇸</span>`;

    if (filtered.length === 0) {
        grid.innerHTML = `
            <div class="empty">
                <div class="empty-icon">🔍</div>
                <h3>არაფერი მოიძებნა</h3>
                <p>სცადეთ სხვა საძიებო სიტყვა ან კატეგორია</p>
            </div>
        `;
        return;
    }

    grid.innerHTML = filtered.map((v, idx) => `
        <div class="card" style="animation-delay: ${idx * 0.03}s">
            <div class="card-image">
                ${v.image ? `<img src="${v.image}" alt="${v.en}" loading="lazy" onerror="this.style.display='none'; this.parentElement.innerHTML='<span class=\'placeholder\'>🏗️</span>'">` : '<span class="placeholder">🏗️</span>'}
                <span class="card-category" style="background: ${categoryColors[v.category] || '#e76f51'}">${categoryNames[v.category]}</span>
            </div>
            <div class="card-body">
                <div class="card-title">${v.en}</div>
                <div class="card-translation">${v.ka}</div>
                <div class="card-desc">${v.desc}</div>
                <div class="card-id">#${v.id} • ${categoryNames[v.category]}</div>
            </div>
        </div>
    `).join('');
}

document.getElementById('searchInput').addEventListener('input', (e) => {
    searchTerm = e.target.value;
    renderCards();
});

window.addEventListener('scroll', () => {
    document.getElementById('scrollTop').classList.toggle('visible', window.scrollY > 500);
});

renderCategories();
renderCards();
    

// ==================== QUIZ FUNCTIONALITY ====================
const QUIZ_LENGTH = 20;
let quizQuestions = [];
let currentQuestionIndex = 0;
let quizScore = 0;
let quizAnswers = [];
let quizStartTime = null;

function openQuiz() {
    document.getElementById('quizOverlay').classList.add('active');
    document.body.style.overflow = 'hidden';
    showQuizStart();
}

function closeQuiz() {
    document.getElementById('quizOverlay').classList.remove('active');
    document.body.style.overflow = '';
    resetQuiz();
}

function resetQuiz() {
    quizQuestions = [];
    currentQuestionIndex = 0;
    quizScore = 0;
    quizAnswers = [];
    quizStartTime = null;
}

function shuffleArray(array) {
    const arr = [...array];
    for (let i = arr.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
}

function generateQuizQuestions() {
    const shuffled = shuffleArray(vocabulary);
    const selected = shuffled.slice(0, QUIZ_LENGTH);

    quizQuestions = selected.map((item) => {
        const types = ['en_to_ka', 'ka_to_en', 'desc_to_term'];
        const type = types[Math.floor(Math.random() * types.length)];

        let question, correctAnswer, options;

        if (type === 'en_to_ka') {
            question = 'რა არის "' + item.en + '" ქართულად?';
            correctAnswer = item.ka;
            const wrongPool = vocabulary.filter(v => v.id !== item.id);
            const wrong = shuffleArray(wrongPool).slice(0, 3).map(v => v.ka);
            options = shuffleArray([correctAnswer, ...wrong]);
        } else if (type === 'ka_to_en') {
            question = 'რა არის "' + item.ka + '" ინგლისურად?';
            correctAnswer = item.en;
            const wrongPool = vocabulary.filter(v => v.id !== item.id);
            const wrong = shuffleArray(wrongPool).slice(0, 3).map(v => v.en);
            options = shuffleArray([correctAnswer, ...wrong]);
        } else {
            question = 'რომელი ტერმინი შეესაბამება აღწერილობას:<br><em style="color:var(--text-light);font-size:0.95rem;">"' + item.desc.substring(0, 120) + '..."</em>';
            correctAnswer = item.ka;
            const wrongPool = vocabulary.filter(v => v.id !== item.id);
            const wrong = shuffleArray(wrongPool).slice(0, 3).map(v => v.ka);
            options = shuffleArray([correctAnswer, ...wrong]);
        }

        return {
            id: item.id,
            type: type,
            question: question,
            correct: correctAnswer,
            options: options,
            en: item.en,
            ka: item.ka,
            category: item.category
        };
    });
}

        '<li>✅ <strong>3 ტიპის კითხვა</strong> — ინგლისური→ქართული, ქართული→ინგლისური, აღწერილობა→ტერმინი</li>' +

        '<li>✅ ყოველ ახალ ტესტზე <strong>ახალი, შემთხვევითი კითხვები</strong></li>' +
        '</ul></div>' +
        '<button class="quiz-nav-btn primary" onclick="startQuiz()" style="font-size:1.1rem;padding:1rem 2.5rem;">' +
        '🚀 დაიწყე ტესტი</button></div>';
}

function startQuiz() {
    generateQuizQuestions();
    currentQuestionIndex = 0;
    quizScore = 0;
    quizAnswers = [];
    quizStartTime = Date.now();
    showQuestion();
}

function showQuestion() {
    const q = quizQuestions[currentQuestionIndex];
    const body = document.getElementById('quizBody');
    const progress = ((currentQuestionIndex + 1) / QUIZ_LENGTH) * 100;

    let optionsHtml = '';
    for (let i = 0; i < q.options.length; i++) {
        optionsHtml += '<button class="quiz-option" data-idx="' + i + '" data-ans="' + encodeURIComponent(q.options[i]) + '">' + q.options[i] + '</button>';
    }

    body.innerHTML = '<div class="quiz-progress">' +
        '<div class="quiz-progress-bar"><div class="quiz-progress-fill" style="width:' + progress + '%"></div></div>' +
        '<div class="quiz-progress-text">' + (currentQuestionIndex + 1) + ' / ' + QUIZ_LENGTH + '</div></div>' +
        '<div class="quiz-question"><span class="q-num">' + (currentQuestionIndex + 1) + '</span>' + q.question + '</div>' +
        '<div class="quiz-options" id="quizOptions">' + optionsHtml + '</div>' +
        '<div class="quiz-feedback" id="quizFeedback"></div>' +
        '<div class="quiz-nav">' +
        '<button class="quiz-nav-btn secondary" onclick="closeQuiz()">გამოსვლა</button>' +
        '<button class="quiz-nav-btn primary" id="nextBtn" onclick="nextQuestion()" disabled>შემდეგი →</button></div>';

    // Add click handlers
    document.querySelectorAll('.quiz-option').forEach(btn => {
        btn.addEventListener('click', function() {
            const answer = decodeURIComponent(this.getAttribute('data-ans'));
            selectAnswer(answer);
        });
    });
}

function selectAnswer(answer) {
    const q = quizQuestions[currentQuestionIndex];
    const options = document.querySelectorAll('.quiz-option');
    const feedback = document.getElementById('quizFeedback');
    const nextBtn = document.getElementById('nextBtn');

    options.forEach(opt => opt.classList.add('disabled'));

    const isCorrect = answer === q.correct;

    if (isCorrect) {
        for (let opt of options) {
            if (decodeURIComponent(opt.getAttribute('data-ans')) === answer) {
                opt.classList.add('correct');
            }
        }
        quizScore++;
        feedback.innerHTML = '<strong>✅ სწორია!</strong> "' + q.en + '" = "' + q.ka + '"';
        feedback.className = 'quiz-feedback correct show';
    } else {
        for (let opt of options) {
            const optAns = decodeURIComponent(opt.getAttribute('data-ans'));
            if (optAns === answer) {
                opt.classList.add('wrong');
            }
            if (optAns === q.correct) {
                opt.classList.add('correct');
            }
        }
        feedback.innerHTML = '<strong>❌ არასწორია.</strong> სწორი პასუხი: "' + q.correct + '"<br><small>' + q.en + ' = ' + q.ka + '</small>';
        feedback.className = 'quiz-feedback wrong show';
    }

    quizAnswers.push({
        question: q.question,
        selected: answer,
        correct: q.correct,
        isCorrect: isCorrect,
        en: q.en,
        ka: q.ka
    });

    nextBtn.disabled = false;
}

function nextQuestion() {
    currentQuestionIndex++;
    if (currentQuestionIndex >= QUIZ_LENGTH) {
        showResults();
    } else {
        showQuestion();
    }
}

function showResults() {
    const body = document.getElementById('quizBody');
    const timeSpent = Math.round((Date.now() - quizStartTime) / 1000);
    const minutes = Math.floor(timeSpent / 60);
    const seconds = timeSpent % 60;
    const percentage = Math.round((quizScore / QUIZ_LENGTH) * 100);

    let message = '';
    if (percentage >= 90) message = '🏆 შესანიშნავი! შენ ნამდვილი პროფესიონალი ხარ!';
    else if (percentage >= 70) message = '👏 ძალიან კარგი! კარგი შედეგია!';
    else if (percentage >= 50) message = '👍 არა ცუდი! კიდევ შეგიძლია გაუმჯობესება.';
    else message = '📚 გაიარე ლექსიკონი და სცადე თავიდან!';

    let answersHtml = '';
    for (let i = 0; i < quizAnswers.length; i++) {
        const a = quizAnswers[i];
        answersHtml += '<div style="padding:0.5rem 0;border-bottom:1px solid var(--border);font-size:0.85rem;">' +
            '<span style="color:' + (a.isCorrect ? '#059669' : '#dc2626') + ';">' + (a.isCorrect ? '✅' : '❌') + '</span> ' +
            '<strong>' + (i+1) + '.</strong> ' + a.en + ' = ' + a.ka +
            (!a.isCorrect ? '<br><small style="color:var(--text-light);">შენი პასუხი: ' + a.selected + '</small>' : '') +
            '</div>';
    }

    body.innerHTML = '<div class="quiz-results">' +
        '<div class="score-circle" style="--score: ' + percentage + ';">' +
        '<div class="score-inner">' + percentage + '%<div class="score-label">' + quizScore + '/' + QUIZ_LENGTH + '</div></div></div>' +
        '<h3>ტესტი დასრულებულია!</h3>' +
        '<p class="result-msg">' + message + '</p>' +
        '<div class="result-detail">' +
        '<div class="result-stat"><div class="num">' + quizScore + '</div><div class="label">სწორი</div></div>' +
        '<div class="result-stat"><div class="num">' + (QUIZ_LENGTH - quizScore) + '</div><div class="label">არასწორი</div></div>' +
        '<div class="result-stat"><div class="num">' + minutes + ':' + seconds.toString().padStart(2,'0') + '</div><div class="label">დრო</div></div></div>' +
        '<div style="margin-bottom:1.5rem;">' +
        '<button class="quiz-nav-btn primary" onclick="startQuiz()" style="margin-right:0.5rem;">🔄 ახალი ტესტი</button>' +
        '<button class="quiz-nav-btn secondary" onclick="closeQuiz()">დახურვა</button></div>' +
        '<div style="text-align:left;background:var(--bg);border-radius:var(--radius-sm);padding:1rem;max-height:200px;overflow-y:auto;">' +
        '<h4 style="margin-bottom:0.5rem;color:var(--primary-dark);">შენი პასუხები:</h4>' + answersHtml + '</div></div>';
}

// Close quiz on overlay click
document.getElementById('quizOverlay').addEventListener('click', function(e) {
    if (e.target === this) closeQuiz();
});

// Escape key to close quiz
document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape' && document.getElementById('quizOverlay').classList.contains('active')) {
        closeQuiz();
    }
});

    </script>
